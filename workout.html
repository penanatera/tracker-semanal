<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<title>Rutina — Tracker Semanal</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh;padding:20px 16px 80px;max-width:560px;margin:0 auto;}

  .top-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .back-btn{font-size:13px;color:#555;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:6px 12px;cursor:pointer;text-decoration:none;}
  h1{font-size:18px;font-weight:700;color:#fff;}
  .subtitle{font-size:11px;color:#555;margin-top:2px;}

  /* DAY SELECTOR */
  .days-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:none;}
  .days-scroll::-webkit-scrollbar{display:none;}
  .day-pill{flex-shrink:0;padding:8px 16px;border-radius:99px;border:1px solid #2a2a2a;background:#111;color:#444;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .day-pill.active{border-color:transparent;color:#fff;}
  .day-pill.today{border-style:dashed;}

  /* WORKOUT HEADER */
  .workout-header{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:16px;margin-bottom:16px;}
  .workout-day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
  .workout-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;}
  .workout-meta{display:flex;gap:8px;flex-wrap:wrap;}
  .meta-chip{font-size:11px;background:#222;border-radius:99px;padding:4px 10px;color:#888;}

  /* DESCANSO */
  .rest-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;}
  .rest-emoji{font-size:48px;margin-bottom:12px;}
  .rest-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px;}
  .rest-tips{display:flex;flex-direction:column;gap:8px;margin-top:16px;text-align:left;}
  .rest-tip{display:flex;align-items:center;gap:10px;font-size:13px;color:#666;background:#111;border-radius:10px;padding:10px 12px;}

  /* EXERCISE CARDS */
  .section-label{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.08em;margin:0 0 10px;}
  .ex-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .ex-header{display:flex;align-items:flex-start;gap:10px;padding:14px 14px 12px;cursor:pointer;}
  .ex-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
  .ex-info{flex:1;}
  .ex-name{font-size:13px;font-weight:600;color:#f0f0f0;margin-bottom:4px;}
  .ex-chips{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;}
  .chip-series{background:#222;color:#888;}
  .chip-fallo{color:#fff;}
  .ex-toggle{font-size:18px;color:#333;margin-left:auto;flex-shrink:0;}
  .ex-details{display:none;padding:0 14px 14px;}
  .ex-details.open{display:block;}
  .detail-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
  .detail-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
  .detail-text{font-size:12px;color:#666;line-height:1.5;}
  .detail-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#444;margin-bottom:2px;}
  .alterno-box{background:#111;border-radius:10px;padding:10px 12px;margin-top:2px;}
  .alterno-text{font-size:12px;color:#888;line-height:1.5;}
  .done-btn{width:100%;padding:10px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;transition:all .15s;}
  .done-btn.pending{background:#222;color:#555;}
  .done-btn.done{background:#1D9E7522;color:#1D9E75;border:1px solid #1D9E7544;}

  /* CARDIO */
  .cardio-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:14px;margin-top:6px;}
  .cardio-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .cardio-main{font-size:14px;color:#f0f0f0;font-weight:600;margin-bottom:6px;}
  .cardio-alt{font-size:12px;color:#555;display:flex;align-items:center;gap:6px;}

  /* PROGRESS */
  .progress-bar-wrap{height:4px;background:#222;border-radius:99px;overflow:hidden;margin:12px 0 0;}
  .progress-bar-fill{height:100%;border-radius:99px;transition:width .4s;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:1px solid #1a1a1a;display:flex;padding:8px 0 20px;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:#444;font-size:10px;font-weight:600;cursor:pointer;}
  .nav-item.active{color:#6C4FD4;}
  .nav-icon{font-size:20px;}
</style>
</head>
<body>

<div class="top-nav">
  <a href="index.html" class="back-btn">← Tracker</a>
  <div>
    <h1>Mi Rutina 🔥</h1>
    <div class="subtitle" id="today-label">Modo Guerra</div>
  </div>
</div>

<!-- DAY SELECTOR -->
<div class="days-scroll" id="days-scroll"></div>

<!-- CONTENT -->
<div id="workout-content"></div>

<script>
const DIAS_ORDEN = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];
const DIAS_LABEL = {lunes:"Lunes",martes:"Martes",miercoles:"Miércoles",jueves:"Jueves",viernes:"Viernes",sabado:"Sábado",domingo:"Domingo"};

const RUTINA = {
  lunes:{nombre:"Descanso Activo",emoji:"😴",color:"#444",descanso:true,cardio:"Movilidad ligera opcional",cardioAlt:"Los 2km caminata a casa cuentan como recuperación activa 🏠",ejercicios:[]},
  martes:{nombre:"Pecho + Hombro + Tríceps",emoji:"💪",color:"#6C4FD4",cardio:"15 min caminata inclinada 10–12%",cardioAlt:"Más los 2km caminata zona 2 a casa 🏠",ejercicios:[
    {n:"Press banca mancuernas",s:"4×8–10",i:"Pesado",f:"Última serie: 1–2 reps del fallo",a:"Press máquina Smith o máquina de pecho",t:"Compuesto principal — no negociar"},
    {n:"Press Arnold sentado",s:"3×10–12",i:"Moderado pesado",f:"NO al fallo",a:"Press militar mancuernas o máquina de hombro",t:"Rango completo de movimiento"},
    {n:"Aperturas polea cruzada",s:"3×12–15",i:"Moderado",f:"Última serie al fallo total",a:"Aperturas mancuernas banco plano o peck deck",t:"Codos ligeramente flexionados"},
    {n:"Elevaciones laterales",s:"3×15–20",i:"Ligero-moderado",f:"2 últimas series al fallo",a:"Elevaciones polea baja o máquina hombros",t:"Sin impulso — movimiento limpio"},
    {n:"Extensión tríceps cuerda",s:"3×12–15",i:"Moderado",f:"Última serie al fallo total",a:"Extensión barra recta o press francés polea",t:"Codos fijos — solo mueve el antebrazo"}
  ]},
  miercoles:{nombre:"Espalda + Bíceps + Antebrazo",emoji:"🏋️",color:"#2B7FD4",cardio:"15 min bicicleta estática",cardioAlt:"Más los 2km caminata zona 2 a casa 🏠",ejercicios:[
    {n:"Remo mancuerna un brazo",s:"4×8–10",i:"Pesado",f:"1–2 reps del fallo",a:"Remo en máquina o remo polea baja agarre neutro",t:"Codo pegado — tira con la espalda no el brazo"},
    {n:"Jalón al pecho agarre ancho",s:"4×10–12",i:"Moderado pesado",f:"Última serie cerca del fallo",a:"Jalón agarre neutro o jalón con banda",t:"Baja hasta el pecho — no solo a la barbilla"},
    {n:"Curl bíceps alterno",s:"3×10–12",i:"Moderado",f:"Última serie al fallo controlado",a:"Curl barra recta o curl en máquina",t:"Supina la muñeca — máxima contracción arriba"},
    {n:"Curl martillo",s:"3×12–15",i:"Moderado",f:"Última serie al fallo",a:"Curl cuerda polea baja o curl neutro mancuernas",t:"Agarre neutro — trabaja braquial y antebrazo"},
    {n:"Agarre colgado en barra",s:"3×al fallo",i:"Fallo total",f:"Aguantar hasta soltarte",a:"Farmer walks 3×30m o pinza de dedos con disco",t:"Si no hay barra usa el alterno directamente"}
  ]},
  jueves:{nombre:"Piernas Pesado",emoji:"🦵",color:"#C44B1A",cardio:"20 min caminata inclinada",cardioAlt:"Más los 2km caminata zona 2 a casa 🏠",ejercicios:[
    {n:"Prensa de piernas",s:"4×8–10",i:"Pesado",f:"NUNCA al fallo — para con 2–3 en reserva",a:"Sentadilla hack máquina o sentadilla Smith",t:"Pies anchura hombros — rodillas alineadas con pies"},
    {n:"Sentadilla goblet",s:"3×12",i:"Moderado",f:"Quedar a 2 reps del fallo",a:"Sentadilla sumo mancuerna o zancadas alternas",t:"Mancuerna al pecho — talones en el suelo"},
    {n:"Extensión cuádriceps",s:"3×15",i:"Moderado",f:"Última serie al fallo total",a:"Sentadilla una pierna asistida o step-up mancuernas",t:"Pausa 1s arriba — contrae el cuádriceps fuerte"},
    {n:"Curl femoral tumbado",s:"3×12–15",i:"Moderado",f:"Última serie al fallo",a:"Curl femoral sentado o peso muerto rumano mancuernas",t:"Cadera pegada al banco — no levantes el glúteo"},
    {n:"Elevación pantorrillas",s:"4×20–25",i:"Moderado-alto",f:"Todas al fallo",a:"Elevación pantorrillas sentado o en escalón",t:"Pausa 2s arriba y 2s abajo — sin rebote"}
  ]},
  viernes:{nombre:"Pecho + Espalda Moderado + Core",emoji:"🔁",color:"#1D9E75",cardio:"15 min HIIT",cardioAlt:"Más los 2km caminata zona 2 a casa 🏠",ejercicios:[
    {n:"Press inclinado mancuernas",s:"3×12",i:"80% del peso del martes",f:"NO al fallo — día moderado",a:"Press inclinado Smith o máquina inclinada",t:"Volumen moderado — recuperación activa"},
    {n:"Peck deck",s:"3×15",i:"Moderado",f:"Última serie al fallo",a:"Aperturas mancuernas banco plano o polea cruzada baja",t:"Rango completo — toca al centro sin chocar codos"},
    {n:"Remo polea baja",s:"3×12–15",i:"Moderado",f:"No al fallo",a:"Remo en máquina o remo con banda",t:"Espalda recta — tira hacia el ombligo"},
    {n:"Plancha frontal",s:"4×45–60 seg",i:"Core",f:"Fallo de tiempo",a:"Plancha rodillas o plancha lateral",t:"Cadera alineada — no dejes que caiga ni suba"},
    {n:"Crunch polea cuerda",s:"3×20",i:"Ligero",f:"Congestión — no al fallo",a:"Crunch suelo con peso o máquina abdominal",t:"Contrae el abdomen — no uses cuello ni espalda baja"}
  ]},
  sabado:{nombre:"Piernas Moderado + Core",emoji:"🦵",color:"#8B6914",cardio:"15 min bicicleta zona 2",cardioAlt:"Más los 2km caminata zona 2 a casa 🏠",ejercicios:[
    {n:"Peso muerto mancuernas",s:"4×10",i:"Pesado controlado",f:"NUNCA al fallo — técnica primero",a:"Peso muerto barra trampa o extensiones cadera máquina",t:"Espalda recta — bisagra de cadera, no sentadilla"},
    {n:"Prensa pies altos",s:"3×12",i:"Moderado",f:"No al fallo",a:"Zancadas caminando o sentadilla búlgara",t:"Pies altos — enfoque en femoral y glúteo"},
    {n:"Curl femoral sentado",s:"3×15",i:"Moderado",f:"Última serie al fallo",a:"Curl femoral tumbado o peso muerto rumano una pierna",t:"Rango completo — no uses impulso al bajar"},
    {n:"Elevación piernas colgado",s:"3×al fallo",i:"Core",f:"Al fallo total",a:"Elevación piernas en banco o tijeras en suelo",t:"Piernas casi rectas — contrae el abdomen bajo"},
    {n:"Russian twist",s:"3×20 c/lado",i:"Core",f:"Última serie al fallo",a:"Rotaciones torso polea o woodchop mancuerna",t:"Pies levantados — gira desde el torso"}
  ]},
  domingo:{nombre:"Hombro + Brazo + Cardio",emoji:"💪",color:"#993C1D",cardio:"30 min caminata inclinada o bicicleta",cardioAlt:"Los 2km a casa cuentan como parte del cardio 🏠",ejercicios:[
    {n:"Elevaciones laterales",s:"4×15–20",i:"Ligero-moderado",f:"2 últimas al fallo",a:"Elevaciones polea baja o máquina hombros",t:"Sin trampa con el cuerpo — codos ligeramente flexionados"},
    {n:"Pájaros mancuernas",s:"3×15",i:"Ligero",f:"Última al fallo",a:"Pájaros en polea o face pulls",t:"Pecho abajo — abre los brazos como pájaro"},
    {n:"Curl concentrado",s:"3×12 c/lado",i:"Moderado",f:"Última al fallo total",a:"Curl polea baja o curl predicador máquina",t:"Codo fijo en el muslo — contracción máxima arriba"},
    {n:"Press francés",s:"3×12",i:"Moderado",f:"No al fallo",a:"Extensión tríceps mancuerna o fondos en banco",t:"Codos apuntando al techo — no los abras"},
    {n:"Farmer walks",s:"3×40 metros",i:"Pesado",f:"Hasta que el agarre muera",a:"Agarre colgado barra 3×fallo o cargadas mancuernas",t:"Espalda recta — pasos cortos y controlados"}
  ]}
};

const FALLO_COLORS = {
  "NUNCA al fallo": "#993C1D",
  "NO al fallo": "#993C1D",
  "No al fallo": "#993C1D",
  "al fallo total": "#1D9E75",
  "Al fallo total": "#1D9E75",
  "Fallo de tiempo": "#1D9E75",
  "al fallo": "#C47E1A",
  "cerca del fallo": "#C47E1A",
  "del fallo": "#C47E1A",
};

function falloColor(f) {
  for (const [k,v] of Object.entries(FALLO_COLORS)) { if (f.includes(k)) return v; }
  return "#888";
}

let currentDay = null;
let doneMap = JSON.parse(localStorage.getItem("done-map") || "{}");

function getTodayKey() {
  const d = new Date().getDay(); // 0=dom,1=lun...
  const map = [6,0,1,2,3,4,5]; // sunday=6→domingo
  return DIAS_ORDEN[map[d]];
}

function buildDaySelector() {
  const scroll = document.getElementById("days-scroll");
  const todayKey = getTodayKey();
  DIAS_ORDEN.forEach(key => {
    const r = RUTINA[key];
    const pill = document.createElement("div");
    pill.className = "day-pill" + (key===todayKey?" today":"");
    pill.style.setProperty("--c", r.color);
    pill.innerHTML = `${r.emoji} ${DIAS_LABEL[key]}`;
    pill.onclick = () => selectDay(key);
    pill.id = "pill-"+key;
    scroll.appendChild(pill);
  });
}

function selectDay(key) {
  if (currentDay) {
    const prev = document.getElementById("pill-"+currentDay);
    if (prev) { prev.classList.remove("active"); prev.style.background=""; prev.style.borderColor=""; prev.style.color=""; }
  }
  currentDay = key;
  const pill = document.getElementById("pill-"+key);
  if (pill) { pill.classList.add("active"); pill.style.background=RUTINA[key].color; pill.style.color="#fff"; }
  renderWorkout(key);
  pill.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});
}

function renderWorkout(key) {
  const r = RUTINA[key];
  const c = document.getElementById("workout-content");
  const todayKey = getTodayKey();
  const isToday = key===todayKey;

  if (r.descanso) {
    c.innerHTML = `
      <div class="workout-header" style="border-color:${r.color}33;">
        <div class="workout-day" style="color:${r.color};">${DIAS_LABEL[key]}${isToday?' · HOY':''}</div>
        <div class="workout-name">${r.emoji} ${r.nombre}</div>
      </div>
      <div class="rest-card">
        <div class="rest-emoji">😴</div>
        <div class="rest-title">Día de recuperación</div>
        <div style="font-size:13px;color:#555;line-height:1.6;">El músculo crece cuando descansas,<br>no cuando entrenas.</div>
        <div class="rest-tips">
          <div class="rest-tip">😴 Dormir 7–8 horas mínimo</div>
          <div class="rest-tip">🥩 Comer proteína — el músculo se repara hoy</div>
          <div class="rest-tip">💧 Mucha agua — al menos 2.5L</div>
          <div class="rest-tip">🚶 ${r.cardioAlt}</div>
          <div class="rest-tip">🧘 Movilidad ligera si quieres — 10 min</div>
        </div>
      </div>`;
    return;
  }

  const doneKey = key+"-exercises";
  const done = doneMap[doneKey] || {};
  const totalEx = r.ejercicios.length;
  const doneCount = Object.values(done).filter(Boolean).length;
  const pct = Math.round((doneCount/totalEx)*100);

  let html = `
    <div class="workout-header" style="border-color:${r.color}44;">
      <div class="workout-day" style="color:${r.color};">${DIAS_LABEL[key]}${isToday?' · HOY':''}</div>
      <div class="workout-name">${r.emoji} ${r.nombre}</div>
      <div class="workout-meta">
        <span class="meta-chip">🏋️ ${totalEx} ejercicios</span>
        <span class="meta-chip">✅ ${doneCount}/${totalEx} hechos</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%;background:${r.color};"></div>
      </div>
    </div>
    <div class="section-label">Ejercicios</div>`;

  r.ejercicios.forEach((ex, i) => {
    const isDone = done[i] || false;
    const fc = falloColor(ex.f);
    html += `
      <div class="ex-card" id="ex-${i}">
        <div class="ex-header" onclick="toggleEx(${i})">
          <div class="ex-num" style="background:${r.color}22;color:${r.color};">${i+1}</div>
          <div class="ex-info">
            <div class="ex-name" style="${isDone?'text-decoration:line-through;color:#555;':''}">${ex.n}</div>
            <div class="ex-chips">
              <span class="chip chip-series">${ex.s}</span>
              <span class="chip chip-fallo" style="background:${fc}22;color:${fc};">${ex.f}</span>
            </div>
          </div>
          <div class="ex-toggle" id="toggle-${i}">▾</div>
        </div>
        <div class="ex-details" id="det-${i}">
          <div class="detail-row">
            <div class="detail-icon">⚡</div>
            <div class="detail-text"><div class="detail-label">Intensidad</div>${ex.i}</div>
          </div>
          <div class="detail-row">
            <div class="detail-icon">💡</div>
            <div class="detail-text"><div class="detail-label">Técnica</div>${ex.t}</div>
          </div>
          <div class="detail-row">
            <div class="detail-icon">🔄</div>
            <div>
              <div class="detail-label">Alterno (si está ocupado)</div>
              <div class="alterno-box"><div class="alterno-text">${ex.a}</div></div>
            </div>
          </div>
          <button class="done-btn ${isDone?'done':'pending'}" onclick="toggleDone(${i}, '${key}')">
            ${isDone?'✓ Completado — toca para desmarcar':'Marcar como completado'}
          </button>
        </div>
      </div>`;
  });

  html += `
    <div class="cardio-card">
      <div class="cardio-title">🏃 Cardio del día</div>
      <div class="cardio-main">${r.cardio}</div>
      <div class="cardio-alt">🏠 ${r.cardioAlt}</div>
    </div>`;

  c.innerHTML = html;
}

function toggleEx(i) {
  const det = document.getElementById("det-"+i);
  const tog = document.getElementById("toggle-"+i);
  const isOpen = det.classList.contains("open");
  det.classList.toggle("open", !isOpen);
  tog.textContent = isOpen ? "▾" : "▴";
}

function toggleDone(i, key) {
  const doneKey = key+"-exercises";
  if (!doneMap[doneKey]) doneMap[doneKey] = {};
  doneMap[doneKey][i] = !doneMap[doneKey][i];
  localStorage.setItem("done-map", JSON.stringify(doneMap));
  renderWorkout(key);
  // re-open the detail
  setTimeout(()=>{
    const det = document.getElementById("det-"+i);
    const tog = document.getElementById("toggle-"+i);
    if(det){det.classList.add("open");tog.textContent="▴";}
  },50);
}

// Init
buildDaySelector();
const todayKey = getTodayKey();
document.getElementById("today-label").textContent = "Hoy: "+DIAS_LABEL[todayKey];
selectDay(todayKey);
</script>
</body>
</html>
