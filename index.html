<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker Premium</title>
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="container">

  <div class="topbar">
    <h1>🔥 Tracker Premium</h1>

    <button onclick="toggleTheme()">
      🌙 / ☀️
    </button>
  </div>

  <div class="card">
    <h2>📉 Evolución de peso</h2>
    <canvas id="weightChart"></canvas>
  </div>

  <div class="card">
    <h2>📅 Disciplina mensual</h2>
    <div id="calendarGrid"></div>
  </div>

  <div class="card">
    <h2>🎯 Meta de peso</h2>

    <div class="goal-bar">
      <div id="goalBar"></div>
    </div>

    <div id="goalText"></div>
  </div>

  <div class="card streak-card">
    <div>🔥</div>
    <div>
      <h2>Racha élite</h2>
      <p id="streakCount">0 semanas</p>
    </div>
  </div>

  <div class="card">
    <h2>📝 Nota del día</h2>

    <textarea id="dailyNote" placeholder="¿Cómo te sentiste hoy?"></textarea>

    <div class="mood-row">
      <button onclick="setMood('😴')">😴</button>
      <button onclick="setMood('😐')">😐</button>
      <button onclick="setMood('🙂')">🙂</button>
      <button onclick="setMood('🔥')">🔥</button>
      <button onclick="setMood('💪')">💪</button>
    </div>
  </div>

  <div class="actions">
    <button onclick="exportExcel()">📊 Excel</button>
    <button onclick="exportPDF()">📄 PDF</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
